name: pos_system
description: "POS System Kazakhstan — кассовое ПО для розничной торговли"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  cupertino_icons: ^1.0.8

  # State management
  flutter_bloc: ^9.1.0

  # HTTP — kept (http) for legacy ApiClient + dio for the new client with interceptors.
  http: ^1.3.0
  dio: ^5.7.0

  # Local storage (drift) — central piece of the offline-first redesign (T1.1+)
  # drift stays on 2.31 because drift_dev >=2.32 requires analyzer 10+ (Flutter
  # SDK currently ships analyzer 8). Same reason keeps drift_flutter on 0.2.x
  # and sqlite3 on 2.x. The macOS Xcode 26 fix comes from sqlcipher_flutter_libs
  # ^0.7.0 + a dependency_override pinning sqlite3_flutter_libs to the
  # +eol release that renames its ObjC class out of the way.
  drift: ^2.31.0
  drift_flutter: ^0.2.8
  sqlite3: ^2.4.6
  # SQLCipher-compatible native libs. Drop-in replacement for
  # sqlite3_flutter_libs; drift picks up the underlying sqlite3 symbols
  # transparently. Combined with a per-device key held in secure storage
  # (DatabaseKeyStore), this encrypts pos.drift.sqlite at rest so an `adb
  # backup` / rooted-device extraction can't read bcrypt PIN hashes or
  # sync_outbox payloads.
  #
  # 0.7.0+eol is the last release before simolus3 deprecated this package;
  # it also fixes the Sqlite3FlutterLibsPlugin duplicate-class collision
  # with sqlite3_flutter_libs on Xcode 26 (previous versions defined the
  # same ObjC class name, which Xcode 26's stricter module linker rejects).
  sqlcipher_flutter_libs: ^0.7.0
  path: ^1.9.0
  path_provider: ^2.1.4

  # One-shot read-only access to the legacy Go server's pos.db during migration (T1.4)
  sqflite: ^2.3.3

  # Auth / sync infra
  flutter_secure_storage: ^9.2.2
  uuid: ^4.5.0
  pointycastle: ^3.9.1
  crypto: ^3.0.5
  # Pure-Dart bcrypt (pointycastle-backed internally), verifies hashes minted
  # by BCrypt.Net-Next on the .NET side. Locked decision #12.
  bcrypt: ^1.1.3
  collection: ^1.18.0

  # gRPC for sync (used in P2+)
  grpc: ^4.0.1
  protobuf: ^3.1.0

  # UI bits
  google_fonts: ^8.0.2
  window_manager: ^0.5.1

  # Receipt + Z-report PDF
  printing: ^5.14.0
  pdf: ^3.11.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # drift code generation — kept at 2.31 for analyzer 8.x compat with Flutter SDK
  drift_dev: ^2.31.0
  build_runner: ^2.4.13

  # Mocking + BLoC test
  mocktail: ^1.0.4
  bloc_test: ^10.0.0
  sqflite_common_ffi: ^2.3.3  # test-only: sqflite backed by native sqlite3 (no platform channel)

flutter:
  generate: true
  uses-material-design: true

# Overrides for Xcode 26 compatibility on macOS.
#
# Problem: sqlite3_flutter_libs (pulled in transitively by drift_flutter) and
# sqlcipher_flutter_libs both register an ObjC class named
# `Sqlite3FlutterLibsPlugin`. Xcode 26 / Swift 6 modules hard-fail on the
# collision; older Xcodes silently let it slide.
#
# Fix: pin sqlite3_flutter_libs to 0.6.0+eol and sqlcipher_flutter_libs to
# 0.7.0+eol — simolus3 renamed/namespaced the class in those "EOL" releases
# specifically to resolve this. The `+eol` suffix marks these packages as
# superseded by native Swift PM integration in future Flutter releases; for
# now they are the last working versions.
dependency_overrides:
  # +eol packages are empty transitional shells — their only job is to
  # displace the older Flutter-specific build scripts that shipped the
  # duplicate `Sqlite3FlutterLibsPlugin` ObjC class Xcode 26 rejects.
  # Real SQLCipher support now lives in package:sqlite3 3.x.
  sqlite3_flutter_libs: 0.6.0+eol
  sqlcipher_flutter_libs: 0.7.0+eol
  # Runtime drift can go to 2.32 (which requires sqlite3 3.x); drift_dev
  # stays at 2.31 because its analyzer 10+ dep conflicts with Flutter SDK's
  # analyzer 8. Generated .g.dart files are forward-compatible (drift 2.32
  # runtime reads 2.31-generated schemas fine).
  drift: ^2.32.0
  sqlite3: ^3.0.0
