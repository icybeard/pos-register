name: pos_system
description: "POS System Kazakhstan — кассовое ПО для розничной торговли"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  cupertino_icons: ^1.0.8

  # State management
  flutter_bloc: ^9.1.0
  # Value equality for BLoC states. Without this every emit() of a state
  # whose fields are unchanged still triggers a rebuild because BlocBuilder
  # compares by identity. Equatable's `props` overrides == + hashCode in
  # one place per state class.
  equatable: ^2.0.7

  # HTTP — kept (http) for legacy ApiClient + dio for the new client with interceptors.
  http: ^1.3.0
  dio: ^5.7.0

  # Local storage (drift) — central piece of the offline-first redesign (T1.1+)
  # drift stays on 2.31 because drift_dev >=2.32 requires analyzer 10+ (Flutter
  # SDK currently ships analyzer 8). Same reason keeps drift_flutter on 0.2.x
  # and sqlite3 on 2.x. The macOS Xcode 26 fix comes from sqlcipher_flutter_libs
  # ^0.7.0 + a dependency_override pinning sqlite3_flutter_libs to the
  # +eol release that renames its ObjC class out of the way.
  drift: ^2.31.0
  drift_flutter: ^0.2.8
  sqlite3: ^2.4.6
  # SQLCipher-compatible native libs. Drop-in replacement for
  # sqlite3_flutter_libs; drift picks up the underlying sqlite3 symbols
  # transparently. Combined with a per-device key held in secure storage
  # (DatabaseKeyStore), this encrypts pos.drift.sqlite at rest so an `adb
  # backup` / rooted-device extraction can't read bcrypt PIN hashes or
  # sync_outbox payloads.
  #
  # 0.7.0+eol is the last release before simolus3 deprecated this package;
  # it also fixes the Sqlite3FlutterLibsPlugin duplicate-class collision
  # with sqlite3_flutter_libs on Xcode 26 (previous versions defined the
  # same ObjC class name, which Xcode 26's stricter module linker rejects).
  sqlcipher_flutter_libs: ^0.7.0
  path: ^1.9.0
  path_provider: ^2.1.4

  # One-shot read-only access to the legacy Go server's pos.db during migration (T1.4)
  sqflite: ^2.3.3

  # Auth / sync infra
  flutter_secure_storage: ^9.2.2
  # Biometric authentication — Face ID / Touch ID on iOS + macOS,
  # BiometricPrompt on Android. Used as a local trust boundary to unlock
  # a previously-stored access token without re-typing the PIN.
  local_auth: ^2.3.0
  uuid: ^4.5.0
  pointycastle: ^3.9.1
  crypto: ^3.0.5
  # Pure-Dart bcrypt (pointycastle-backed internally), verifies hashes minted
  # by BCrypt.Net-Next on the .NET side. Locked decision #12.
  bcrypt: ^1.1.3
  collection: ^1.18.0

  # gRPC for sync (used in P2+)
  grpc: ^4.0.1
  protobuf: ^3.1.0

  # UI bits
  google_fonts: ^8.0.2
  window_manager: ^0.5.1

  # Receipt + Z-report PDF
  printing: ^5.14.0
  pdf: ^3.11.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # drift code generation — kept at 2.31 for analyzer 8.x compat with Flutter SDK
  drift_dev: ^2.31.0
  build_runner: ^2.4.13

  # Mocking + BLoC test
  mocktail: ^1.0.4
  bloc_test: ^10.0.0
  sqflite_common_ffi: ^2.3.3  # test-only: sqflite backed by native sqlite3 (no platform channel)

flutter:
  generate: true
  uses-material-design: true

# Tell the sqlite3 pub package's native-asset hook to compile SQLite3 Multiple
# Ciphers (sqlite3mc) from the vendored amalgamation in third_party/sqlite3mc/
# instead of downloading a precompiled dylib from GitHub's release CDN.
#
# Why: release-assets.githubusercontent.com redirects to Azure Blob Storage,
# which is blocked by some KZ ISPs — `flutter pub get` times out, which breaks
# Xcode's Run Script build phase. Compiling locally removes the dependency on
# the CDN entirely. First build per platform takes ~60-90s; cached thereafter.
#
# Why sqlite3mc and not plain sqlite3 / SQLCipher proper:
#   - We need SQLCipher-compatible PRAGMA key encryption (see database.dart).
#   - sqlite3mc bundles its own AES, so iOS doesn't need Security framework,
#     Linux doesn't need libcrypto, Windows doesn't need OpenSSL, Android
#     doesn't need a crypto backend picker. One amalgamation, five platforms.
#   - SQLITE3MC_USE_SQL_CIPHER=1 + CODEC_TYPE_SQLCIPHER selects the wire
#     format that matches existing encrypted DBs created by the previous
#     sqlcipher_flutter_libs 0.7.0+eol build path.
#
# See third_party/sqlite3mc/README.md for re-vendoring instructions.
hooks:
  user_defines:
    sqlite3:
      source: source
      path: ./third_party/sqlite3mc/sqlite3mc_amalgamation.c
      defines:
        default_options: false  # sqlite3mc has its own curated defaults
        defines:
          # SQLCipher wire-format compatibility with existing encrypted DBs
          - SQLITE3MC_USE_SQL_CIPHER=1
          - SQLITE3MC_DEFAULT_CIPHER=CODEC_TYPE_SQLCIPHER
          # Threading + temp storage (drift expectations)
          - SQLITE_THREADSAFE=1
          - SQLITE_TEMP_STORE=2
          # Features drift / our queries use
          - SQLITE_ENABLE_FTS5
          - SQLITE_ENABLE_RTREE
          - SQLITE_ENABLE_MATH_FUNCTIONS
          - SQLITE_ENABLE_SESSION
          - SQLITE_ENABLE_PREUPDATE_HOOK
          - SQLITE_ENABLE_DBSTAT_VTAB
          # Hardening / footprint
          - SQLITE_DQS=0
          - SQLITE_DEFAULT_MEMSTATUS=0
          - SQLITE_MAX_EXPR_DEPTH=0
          - SQLITE_OMIT_DEPRECATED
          - SQLITE_OMIT_SHARED_CACHE
          - SQLITE_OMIT_TRACE

# Overrides:
#
# (1) drift 2.32 at runtime requires sqlite3 3.x (which is where the new
#     native-asset hook lives). drift_dev stays at 2.31 because its
#     analyzer 10+ dep conflicts with Flutter SDK's analyzer 8. Generated
#     .g.dart files are forward-compatible (drift 2.32 runtime reads
#     2.31-generated schemas fine).
#
# (2) sqlite3_flutter_libs / sqlcipher_flutter_libs pinned to their
#     `+eol` shells. Xcode 26 / Swift 6 rejects the duplicate ObjC class
#     `Sqlite3FlutterLibsPlugin` that older (non-eol) versions ship. The
#     `+eol` versions are empty transitional shells that renamed the
#     ObjC class out of the way. They no longer provide runtime sqlite
#     symbols — that now comes from the hooks.user_defines block above
#     compiling sqlite3mc locally. Keeping the pins prevents pub from
#     resolving to older non-eol versions that would bring back the
#     collision.
dependency_overrides:
  drift: ^2.32.0
  sqlite3: ^3.0.0
  sqlite3_flutter_libs: 0.6.0+eol
  sqlcipher_flutter_libs: 0.7.0+eol
